name: NeuraPulse Enterprise SEO

on:
  push:
    branches:
      - main
      - master

  workflow_dispatch:

  schedule:
    - cron: "0 2 * * 0"

permissions:
  contents: write

concurrency:
  group: enterprise-seo-${{ github.ref }}
  cancel-in-progress: false

jobs:
  enterprise:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run Enterprise System
        run: |
          python neurapulse_enterprise.py

      - name: Commit Changes
        run: |
          git config user.name "NeuraPulse Bot"
          git config user.email "bot@neurapulse.ai"

          git add .

          if git diff --cached --quiet; then
            echo "No changes detected"
          else
            git commit -m "🤖 Enterprise SEO Auto Update"
          fi

      - name: Push Changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
