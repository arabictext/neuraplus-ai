name: Fix All Blog SEO + Privacy Links

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.py'
      - '.github/**'

permissions:
  contents: write

jobs:
  fix-seo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run fix script on all HTML files
        run: python fix_all_blogs.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "auto: fix SEO + privacy popup on all pages [skip ci]"
            git push
          fi
